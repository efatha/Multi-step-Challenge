<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Multi-step form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="form-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="step-item">
        <div class="step-number active">1</div>
        <div class="step-info">
          <span class="step-label">Step 1</span>
          <span class="step-title">Your info</span>
        </div>
      </div>
      <div class="step-item">
        <div class="step-number">2</div>
        <div class="step-info">
          <span class="step-label">Step 2</span>
          <span class="step-title">Select plan</span>
        </div>
      </div>
      <div class="step-item">
        <div class="step-number">3</div>
        <div class="step-info">
          <span class="step-label">Step 3</span>
          <span class="step-title">Add-ons</span>
        </div>
      </div>
      <div class="step-item">
        <div class="step-number">4</div>
        <div class="step-info">
          <span class="step-label">Step 4</span>
          <span class="step-title">Summary</span>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <!-- Step 1 -->
      <section id="step1" class="step active-step">
        <h2>Personal info</h2>
        <p class="step-description">Please provide your name, email address, and phone number.</p>

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="e.g. Stephen King">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="e.g. stephenking@lorem.com">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="e.g. +1 234 567 890">
        </div>
      </section>

      <!-- Navigation buttons -->
      <div class="navigation">
        <button class="btn btn-secondary" id="goBackBtn">Go Back</button>
        <button class="btn btn-primary" id="nextStepBtn">Next Step</button>
      </div>
    </main>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
</body>
</html>
